# Class
name: Dunes
namespace: Apostasy
class: Biome
#Generation
amplitude: 6.0
frequency: 0.02
octaves: 5
#Generation Location
humidity: 0.225
temperature: 0.9
# Voxels
voxel:
  surface:
    - "Apostasy:Voxel:Sand"
  subsurface:
    - "Apostasy:Voxel:Sand"
  underground:
    - "Apostasy:Voxel:Sandstone"
# Structures
structures:
# Weather and Seasons
default_weather:
  - name: "Apostasy:Weather:Sunny"
seasons:
  - name: "Apostasy:Seasons:Spring"
    temperature: [20.0, 35.0]
    available_weather:
      - name: "Apostasy:Weather:Sunny"
        chance: 0.9
  - name: "Apostasy:Seasons:Summer"
    temperature: [25.0, 40.0]
    available_weather:
      - name: "Apostasy:Weather:Sunny"
        chance: 0.95
  - name: "Apostasy:Seasons:Autumn"
    temperature: [15.0, 30.0]
    available_weather:
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.15
  - name: "Apostasy:Seasons:Winter"
    temperature: [5.0, 20.0]
    available_weather:
      - name: "Apostasy:Weather:Sunny"
        chance: 0.9
# Graphics
ambient_graphics:
  water_color: [235, 210, 150]
  foliage_color: [200, 180, 140]
