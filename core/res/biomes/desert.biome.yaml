# Class
name: Desert
namespace: Apostasy
class: Biome

# Generation
amplitude: 6.0
frequency: 0.02
octaves: 5

# Generation Location
humidity: 0.15
temperature: 0.95

# Terrain shaping
# Deserts are mostly flat hardpan with occasional rocky outcrops and mesas.
# Very low ridge and peak strength — just enough for subtle texture.
# No valley carving (deserts erode flat, not downward).
# Low continental_scale; deserts sit at stable inland elevations.
terrain_shaping:
  ridge_strength:    0.05
  peak_strength:     0.08
  valley_strength:   0.0
  continental_scale: 8.0
  height_curve:      1.0

# Voxels
voxel:
  surface:
    - "Apostasy:Voxel:Sand"
  subsurface:
    - "Apostasy:Voxel:Sand"
  underground:
    - "Apostasy:Voxel:Sandstone"

# Structures
structures:
  - type: tree
    density: 0.02
    voxels:
      trunk: "Apostasy:Voxel:Log"
      canopy: "Apostasy:Voxel:Leaves"
    parameters:
      min_height: 4
      max_height: 7
      canopy_radius: 1
  - type: boulder
    density: 0.5
    voxels:
      boulder: "Apostasy:Voxel:Sandstone"
    parameters:
      min_radius: 2
      max_radius: 4

# Weather and Seasons
default_weather:
  - name: "Apostasy:Weather:Sunny"
seasons:
  - name: "Apostasy:Seasons:Spring"
    temperature: [20.0, 35.0]
    available_weather:
      - name: "Apostasy:Weather:Sunny"
        chance: 0.9
  - name: "Apostasy:Seasons:Summer"
    temperature: [25.0, 40.0]
    available_weather:
      - name: "Apostasy:Weather:Sunny"
        chance: 0.95
  - name: "Apostasy:Seasons:Autumn"
    temperature: [15.0, 30.0]
    available_weather:
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.15
  - name: "Apostasy:Seasons:Winter"
    temperature: [5.0, 20.0]
    available_weather:
      - name: "Apostasy:Weather:Sunny"
        chance: 0.9

# Graphics
ambient_graphics:
  water_color: [235, 210, 150]
  foliage_color: [198, 128, 84]
