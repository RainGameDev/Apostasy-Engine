# Class
name: Mountains
namespace: Apostasy
class: Biome
# Generation
amplitude: 80.0
frequency: 0.003
octaves: 6
# Generation Location
humidity: 0.45
temperature: 0.3
# Terrain shaping
terrain_shaping:
  preset: mountainous
  height_curve: 8.8
  continental_scale: 50.0
# Voxels
voxel:
  surface:
    - "Apostasy:Voxel:Grass"
  subsurface:
    - "Apostasy:Voxel:Dirt"
  underground:
    - "Apostasy:Voxel:Stone"
# Structures
structures:
  - type: tree
    density: 1.0
    voxels:
      trunk: "Apostasy:Voxel:Log"
      canopy: "Apostasy:Voxel:Leaves"
    parameters:
      min_height: 6
      max_height: 12
      canopy_radius: 2
  - type: boulder
    density: 1.0
    voxels:
      boulder: "Apostasy:Voxel:Stone"
    parameters:
      min_radius: 2
      max_radius: 4
# Weather and Seasons
default_weather:
  - name: "Apostasy:Weather:Sunny"
seasons:
  - name: "Apostasy:Seasons:Spring"
    temperature: [5.0, 15.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.05
      - name: "Apostasy:Weather:HeavyRain"
        chance: 0.02
      - name: "Apostasy:Weather:Thunder"
        chance: 0.01
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.25
  - name: "Apostasy:Seasons:Summer"
    temperature: [15.0, 25.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.05
  - name: "Apostasy:Seasons:Autumn"
    temperature: [5.0, 10.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.1
      - name: "Apostasy:Weather:Snow"
        chance: 0.05
  - name: "Apostasy:Seasons:Winter"
    temperature: [-5.0, 5.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.05
      - name: "Apostasy:Weather:Snow"
        chance: 0.1
# Graphics
ambient_graphics:
  water_color: [63, 118, 228]
  foliage_color: [240, 253, 120]
