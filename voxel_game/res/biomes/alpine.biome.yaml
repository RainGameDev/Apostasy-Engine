# Class
name: Alpine
namespace: Apostasy
class: Biome

# Generation
amplitude: 110.0
frequency: 0.004
octaves: 6

# Generation Location
humidity: 0.35
temperature: 0.25

# Terrain shaping
terrain_shaping:
  preset: mountainous
  ridge_strength:    1.0
  valley_strength:   0.8
  continental_scale: 55.0
  height_curve:      2.0

# Voxels
voxel:
  surface:
    - "Apostasy:Voxel:Stone"
  subsurface:
    - "Apostasy:Voxel:Dirt"
  underground:
    - "Apostasy:Voxel:Stone"

# Structures
structures:
  - type: tree
    density: 0.5
    voxels:
      trunk: "Apostasy:Voxel:Log"
      canopy: "Apostasy:Voxel:Leaves"
    parameters:
      min_height: 5
      max_height: 9
      canopy_radius: 2
  - type: boulder
    density: 5.0
    voxels:
      boulder: "Apostasy:Voxel:Stone"
    parameters:
      min_radius: 3
      max_radius: 6

# Weather and Seasons
default_weather:
  - name: "Apostasy:Weather:Cloudy"
seasons:
  - name: "Apostasy:Seasons:Spring"
    temperature: [-5.0, 5.0]
    available_weather:
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.5
      - name: "Apostasy:Weather:Rain"
        chance: 0.15
  - name: "Apostasy:Seasons:Summer"
    temperature: [0.0, 12.0]
    available_weather:
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.5
  - name: "Apostasy:Seasons:Autumn"
    temperature: [-5.0, 5.0]
    available_weather:
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.5
      - name: "Apostasy:Weather:Rain"
        chance: 0.2
  - name: "Apostasy:Seasons:Winter"
    temperature: [-20.0, -2.0]
    available_weather:
      - name: "Apostasy:Weather:Snow"
        chance: 0.6

# Graphics
ambient_graphics:
  water_color: [220, 220, 230]
  foliage_color: [190, 190, 210]
