# Class
name: Savanna
namespace: Apostasy
class: Biome
# Generation
amplitude: 10.0
frequency: 0.008
octaves: 4
# Generation Location
humidity: 0.3
temperature: 0.65
# Terrain shaping
terrain_shaping:
  preset: rolling
  ridge_strength: 0.05
  peak_strength: 0.08
  valley_strength: 0.03
  continental_scale: 14.0
  height_curve: 1.05
# Voxels
voxel:
  surface:
    - "Apostasy:Voxel:Grass"
  subsurface:
    - "Apostasy:Voxel:Dirt"
  underground:
    - "Apostasy:Voxel:Stone"
# Structures
structures:
  - type: tree
    density: 0.4
    voxels:
      trunk: "Apostasy:Voxel:Log"
      canopy: "Apostasy:Voxel:Leaves"
    parameters:
      min_height: 5
      max_height: 9
      canopy_radius: 3
  - type: boulder
    density: 0.15
    voxels:
      boulder: "Apostasy:Voxel:Stone"
    parameters:
      min_radius: 1
      max_radius: 3
# Weather and Seasons
default_weather:
  - name: "Apostasy:Weather:Sunny"
seasons:
  - name: "Apostasy:Seasons:Spring"
    temperature: [18.0, 30.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.2
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.15
  - name: "Apostasy:Seasons:Summer"
    temperature: [22.0, 36.0]
    available_weather:
      - name: "Apostasy:Weather:Sunny"
        chance: 0.85
  - name: "Apostasy:Seasons:Autumn"
    temperature: [15.0, 28.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.15
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.1
  - name: "Apostasy:Seasons:Winter"
    temperature: [10.0, 22.0]
    available_weather:
      - name: "Apostasy:Weather:Sunny"
        chance: 0.8
# Graphics
ambient_graphics:
  water_color: [180, 200, 160]
  foliage_color: [148, 170, 60]
