# Class
name: Bog
namespace: Apostasy
class: Biome
# Generation
amplitude: 5.0
frequency: 0.015
octaves: 4
# Generation Location
humidity: 0.7
temperature: 0.38
# Terrain shaping
terrain_shaping:
  preset: flat
  valley_strength: 0.09
  continental_scale: 6.0
  height_curve: 1.0
# Voxels
voxel:
  surface:
    - "Apostasy:Voxel:Dirt"
  subsurface:
    - "Apostasy:Voxel:Dirt"
  underground:
    - "Apostasy:Voxel:Stone"
# Structures
structures:
  - type: tree
    density: 2.5
    voxels:
      trunk: "Apostasy:Voxel:Log"
      canopy: "Apostasy:Voxel:Leaves"
    parameters:
      min_height: 4
      max_height: 8
      canopy_radius: 2
  - type: boulder
    density: 0.05
    voxels:
      boulder: "Apostasy:Voxel:Stone"
    parameters:
      min_radius: 1
      max_radius: 2
# Weather and Seasons
default_weather:
  - name: "Apostasy:Weather:Cloudy"
seasons:
  - name: "Apostasy:Seasons:Spring"
    temperature: [4.0, 12.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.3
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.35
  - name: "Apostasy:Seasons:Summer"
    temperature: [10.0, 20.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.2
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.3
  - name: "Apostasy:Seasons:Autumn"
    temperature: [2.0, 10.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.35
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.3
  - name: "Apostasy:Seasons:Winter"
    temperature: [-4.0, 4.0]
    available_weather:
      - name: "Apostasy:Weather:Snow"
        chance: 0.15
      - name: "Apostasy:Weather:Rain"
        chance: 0.2
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.4
# Graphics
ambient_graphics:
  water_color: [28, 38, 24]
  foliage_color: [58, 72, 30]
