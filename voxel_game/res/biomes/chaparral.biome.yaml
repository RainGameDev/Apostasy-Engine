# Class
name: Chaparral
namespace: Apostasy
class: Biome
# Generation
amplitude: 18.0
frequency: 0.01
octaves: 5
# Generation Location
humidity: 0.45
temperature: 0.6
# Terrain shaping
terrain_shaping:
  preset: rolling
  ridge_strength: 0.18
  peak_strength: 0.25
  valley_strength: 0.3
  continental_scale: 14.0
  height_curve: 1.35
# Voxels
voxel:
  surface:
    - "Apostasy:Voxel:Grass"
  subsurface:
    - "Apostasy:Voxel:Dirt"
  underground:
    - "Apostasy:Voxel:Stone"
# Structures
structures:
  - type: tree
    density: 0.8
    voxels:
      trunk: "Apostasy:Voxel:Log"
      canopy: "Apostasy:Voxel:Leaves"
    parameters:
      min_height: 3
      max_height: 6
      canopy_radius: 2
  - type: boulder
    density: 1.2
    voxels:
      boulder: "Apostasy:Voxel:Stone"
    parameters:
      min_radius: 1
      max_radius: 4
# Weather and Seasons
default_weather:
  - name: "Apostasy:Weather:Sunny"
seasons:
  - name: "Apostasy:Seasons:Spring"
    temperature: [12.0, 24.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.12
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.15
  - name: "Apostasy:Seasons:Summer"
    temperature: [24.0, 38.0]
    available_weather:
      - name: "Apostasy:Weather:Sunny"
        chance: 0.92
  - name: "Apostasy:Seasons:Autumn"
    temperature: [14.0, 26.0]
    available_weather:
      - name: "Apostasy:Weather:Sunny"
        chance: 0.7
      - name: "Apostasy:Weather:Rain"
        chance: 0.08
  - name: "Apostasy:Seasons:Winter"
    temperature: [6.0, 16.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.25
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.2
# Graphics
ambient_graphics:
  water_color: [110, 150, 130]
  foliage_color: [130, 138, 55]
