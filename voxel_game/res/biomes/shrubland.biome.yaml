# Class
name: Shrubland
namespace: Apostasy
class: Biome
# Generation
amplitude: 14.0
frequency: 0.009
octaves: 4
# Generation Location
humidity: 0.6
temperature: 0.5
# Terrain shaping
terrain_shaping:
  preset: rolling
  ridge_strength: 0.08
  peak_strength: 0.12
  valley_strength: 0.04
  continental_scale: 12.0
  height_curve: 1.1
# Voxels
voxel:
  surface:
    - "Apostasy:Voxel:Grass"
  subsurface:
    - "Apostasy:Voxel:Dirt"
  underground:
    - "Apostasy:Voxel:Stone"
# Structures
structures:
  - type: tree
    density: 1.5
    voxels:
      trunk: "Apostasy:Voxel:Log"
      canopy: "Apostasy:Voxel:Leaves"
    parameters:
      min_height: 3
      max_height: 6
      canopy_radius: 2
  - type: boulder
    density: 0.3
    voxels:
      boulder: "Apostasy:Voxel:Stone"
    parameters:
      min_radius: 1
      max_radius: 3
# Weather and Seasons
default_weather:
  - name: "Apostasy:Weather:Sunny"
seasons:
  - name: "Apostasy:Seasons:Spring"
    temperature: [10.0, 20.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.15
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.2
  - name: "Apostasy:Seasons:Summer"
    temperature: [20.0, 32.0]
    available_weather:
      - name: "Apostasy:Weather:Sunny"
        chance: 0.8
  - name: "Apostasy:Seasons:Autumn"
    temperature: [10.0, 22.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.1
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.15
  - name: "Apostasy:Seasons:Winter"
    temperature: [2.0, 12.0]
    available_weather:
      - name: "Apostasy:Weather:Rain"
        chance: 0.12
      - name: "Apostasy:Weather:Cloudy"
        chance: 0.2
# Graphics
ambient_graphics:
  water_color: [100, 160, 140]
  foliage_color: [120, 148, 60]
